<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #1e1f22;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #2b2d31;
  padding: 40px;
  border-radius: 10px;
  display: flex;
  gap: 40px;
  width: 700px;
  color: white;
}

.left {
  flex: 1;
}

.right {
  width: 220px;
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

p {
  color: #b5bac1;
  font-size: 14px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  margin-bottom: 15px;
  border-radius: 5px;
  border: none;
  background: #1e1f22;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 5px;
  background: #5865f2;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #4752c4;
}

.link {
  color: #00a8fc;
  font-size: 13px;
  cursor: pointer;
}

.qr {
  width: 180px;
  height: 180px;
  background: white;
  margin: 10px auto;
}
</style>
</head>

<body>

<div class="container">
  <div class="left">
    <h1>Welcome back!</h1>
    <p>We're happy to see you again!</p>

    <label>Email or Phone</label>
    <input type="text">

    <label>Password</label>
    <input type="password">

    <div class="link">Forgot your password?</div>

    <button>Log In</button>

    <p>Need an account? <span class="link">Register</span></p>
  </div>

  <div class="right">
    <div class="qr"></div>
    <h3>Log in with QR Code</h3>
    <p>Scan this with your mobile app to log in instantly.</p>
  </div>
</div>

</body>
</html>
